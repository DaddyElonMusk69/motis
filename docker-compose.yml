# ─── Motis Repo-Root Compose ─────────────────────────────────────────────────
# Infrastructure only: Postgres, Redis, and optional MinIO.
# Run application services from the workspace directly. Containerized app
# services live under infra/docker-compose.yml when that workflow is needed.
#
# Usage:
#   docker compose up -d                # start infra
#   docker compose down -v              # stop + delete volumes (clean slate)
#   docker compose logs -f postgres     # tail DB logs

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: motis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: motis
      POSTGRES_PASSWORD: motis
      POSTGRES_DB: motis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run init scripts on first boot
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motis -d motis"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
        -c work_mem=16MB
        -c log_min_duration_statement=500

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: motis_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes

  # ── MinIO (local S3 / R2 replacement) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: motis_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: motis
      MINIO_ROOT_PASSWORD: motisdev123
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: server /data --console-address ":9001"
    profiles:
      - storage   # opt-in: docker compose --profile storage up -d

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: motis_dev
