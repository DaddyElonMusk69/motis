[tool.uv.workspace]
members = [
    "packages/shared",
    "services/motis_agent",
    "services/mcp",
    "services/platform",
]

[tool.uv.sources]
motis-shared = { workspace = true }

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.pytest.ini_options]
testpaths = ["services/motis_agent/tests"]
norecursedirs = [
    ".git",
    ".venv",
    ".uv-cache",
    "node_modules",
    "services/upstream",
    "services/upstream/openclaw",
    "services/upstream/claude-code-source-code",
]
asyncio_mode = "auto"
