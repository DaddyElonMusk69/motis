[project]
name = "motis-shared"
version = "0.1.0"
description = "Shared Pydantic models, types, and utilities for Motis"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "cryptography>=42.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["motis_shared"]
