[project]
name = "motis-operator-sdk"
version = "0.1.0"
description = "LangGraph operator base classes and primitives for Motis"
requires-python = ">=3.11"
dependencies = [
    "motis-shared",
    "langgraph>=0.2",
    "langchain-core>=0.3",
    "redis>=5.0",
    "pydantic>=2.7",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
