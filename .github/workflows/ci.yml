name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & type-check Python ────────────────────────────────────────────────
  python-lint:
    name: Python lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install workspace
        run: uv sync

      - name: Ruff (lint + format check)
        run: uv run ruff check . && uv run ruff format --check .

      - name: Mypy (type check shared packages)
        run: |
          uv run mypy packages/shared/motis_shared
          uv run mypy packages/operator_sdk/motis_operator

  # ── Python tests ────────────────────────────────────────────────────────────
  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    needs: python-lint
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: motis
          POSTGRES_PASSWORD: motis
          POSTGRES_DB: motis
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install workspace
        run: uv sync

      - name: Enable Postgres extensions + create test DB
        env:
          PGPASSWORD: motis
        run: |
          psql -h localhost -U motis -d motis -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
          psql -h localhost -U motis -d motis -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -h localhost -U motis -d postgres -c "CREATE DATABASE motis_test OWNER motis;" || true
          psql -h localhost -U motis -d motis_test -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";" || true
          psql -h localhost -U motis -d motis_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" || true

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://motis:motis@localhost:5432/motis
        run: |
          cd services/platform
          uv run alembic -c ../../alembic.ini upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://motis:motis@localhost:5432/motis_test
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: dGVzdC1rZXktMzItYnl0ZXMtZm9yLWNpLW9ubHk=
          JWT_SECRET: ci-test-jwt-secret-32-bytes-min-len
          AGENT_MCP_SECRET: ci-test-agent-mcp-secret
          MCP_URL: http://localhost:8002
          TERMINAL_BACKEND: subprocess
        run: |
          # Run migrations on test DB
          cd services/platform
          DATABASE_URL=postgresql+asyncpg://motis:motis@localhost:5432/motis_test \
            uv run alembic -c ../../alembic.ini upgrade head
          cd ../..
          uv run pytest --tb=short -q

  # ── Web (Next.js) ───────────────────────────────────────────────────────────
  web-lint:
    name: Web lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npm run type-check
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web
