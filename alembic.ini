[alembic]
script_location = services/platform/motis_platform/db/migrations
prepend_sys_path = .

# DATABASE_URL is read from environment in env.py — not here.
# This file is checked into git (no secrets).
sqlalchemy.url = postgresql+asyncpg://motis:motis@localhost:5432/motis

[post_write_hooks]
# Optionally run black on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
